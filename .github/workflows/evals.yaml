name: Evaluations

on:
  push:
    branches: [main, dev]
    paths:
      - "server/chat/V2/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "server/chat/V2/**"
  workflow_dispatch:

jobs:
  evaluate:
    name: Run Braintrust Evaluations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
      CHATBOT_USER_TOKEN: ${{ secrets.CHATBOT_USER_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install braintrust python-dotenv

      - name: Run migrations
        run: python manage.py migrate

      - name: Start server
        run: |
          python manage.py runserver 0.0.0.0:8001 &
          sleep 5

      - name: Run evaluations
        run: python ../evals/run_eval.py --all-scorers --api-url http://localhost:8001

name: Update model pricing

on:
  schedule:
    - cron: "0 9 * * 1"  # Weekly on Monday 9am UTC
  workflow_dispatch: {}    # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest pricing
        run: python server/scripts/update_pricing.py

      - name: Create PR if pricing changed
        run: |
          set -euo pipefail
          if git diff --quiet server/chat/V2/model_pricing.json; then
            echo "No pricing changes detected."
            exit 0
          fi
          BRANCH="chore/update-model-pricing"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add server/chat/V2/model_pricing.json
          git commit -m "chore: update model pricing from LiteLLM"
          # Force-push is intentional: this branch is owned by the bot and
          # each run replaces last week's pricing snapshot. No human work to clobber.
          git push -f origin "$BRANCH"
          # Create PR only if one doesn't already exist for this branch
          if ! gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty' | grep -q .; then
            gh pr create \
              --title "chore: update model pricing from LiteLLM" \
              --body "Auto-generated by the weekly pricing update workflow." \
              --head "$BRANCH" \
          fi
        env:
          GH_TOKEN: ${{ github.token }}

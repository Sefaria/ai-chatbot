version: '3.8'

services:

  app:
    build: .
    ports:
      - "8001:8001"
    environment:
      DB_NAME: chatbot
      DB_USER: chatbot
      DB_PASSWORD: chatbot_password
      DB_HOST: postgres
      DB_PORT: 5432
      BRAINTRUST_TRACING_ENABLED: "false"
    entrypoint: ["gunicorn", "chatbot_server.wsgi:application", "--bind", "0.0.0.0:8001", "--worker-class", "gthread", "--threads", "4"]

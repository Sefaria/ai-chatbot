---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-anthropic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-anthropic
  template:
    metadata:
      labels:
        app: mock-anthropic
    spec:
      containers:
      - name: mock-anthropic
        image: ai-chatbot-mock-anthropic:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mock-anthropic
spec:
  selector:
    app: mock-anthropic
  ports:
  - port: 8002
    targetPort: 8002

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # Database
  DB_NAME: chatbot
  DB_USER: chatbot
  DB_PASSWORD: chatbot_password
  DB_HOST: postgres
  DB_PORT: "5432"
  
  # Load testing - point at mock instead of real Anthropic API
  ANTHROPIC_BASE_URL: "http://mock-anthropic:8002"
  BRAINTRUST_LOGGING_ENABLED: "false"
  
  # Braintrust config (non-sensitive)
  BRAINTRUST_PROJECT: "On Site Agent"
  CORE_PROMPT_SLUG: "spec-driven-base-prompt-b1fb"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-app
  template:
    metadata:
      labels:
        app: chatbot-app
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
      - name: wait-for-mock
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z mock-anthropic 8002; do echo waiting for mock-anthropic; sleep 2; done']
      containers:
      - name: app
        image: ai-chatbot-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  type: NodePort
  selector:
    app: chatbot-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30001
